name: CTRI Trial Scraper

# ── When does this run? ───────────────────────────────────────────────────────
on:
  # 1. Manually trigger from GitHub with a custom keyword
  workflow_dispatch:
    inputs:
      keyword:
        description: 'Condition / keyword to search (e.g. diabetes)'
        required: true
        default: 'diabetes'

  # 2. Automatically every Sunday at 8am UTC (optional — comment out if not needed)
  schedule:
    - cron: '0 8 * * 0'

# ── The job ───────────────────────────────────────────────────────────────────
jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out your repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Determine keyword
      #   - If triggered manually, use the keyword you typed
      #   - If triggered by schedule, use the DEFAULT_KEYWORD secret (set in repo settings)
      - name: Set keyword
        id: kw
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "keyword=${{ github.event.inputs.keyword }}" >> $GITHUB_OUTPUT
          else
            echo "keyword=${{ secrets.DEFAULT_KEYWORD || 'diabetes' }}" >> $GITHUB_OUTPUT
          fi

      # Step 5: Run the scraper
      - name: Run scraper
        run: python scraper.py --keyword "${{ steps.kw.outputs.keyword }}" --output-dir results

      # Step 6: Upload results as a downloadable artifact (keeps for 30 days)
      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctri-results-${{ steps.kw.outputs.keyword }}
          path: results/
          if-no-files-found: warn
          retention-days: 30

      # Step 7: Also commit results back to the repository (optional)
      #   This means results are permanently stored in your repo under results/
      - name: Commit results to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/ || true
          git diff --staged --quiet || git commit -m "🤖 Auto-scrape: ${{ steps.kw.outputs.keyword }} ($(date -u '+%Y-%m-%d'))"
          git push || true
